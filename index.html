<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Radar 分布式控制中枢</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* ═══════════════════════════════════════════
           Design Tokens — Modern SaaS Theme
           ═══════════════════════════════════════════ */
        :root {
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --primary-light: rgba(99, 102, 241, 0.08);
            --primary-lighter: rgba(99, 102, 241, 0.04);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;

            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --bg-sidebar: #fafbfc;
            --bg-header: #ffffff;

            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;

            --border: #e5e7eb;
            --border-light: #f3f4f6;

            --radius-card: 12px;
            --radius-btn: 8px;
            --radius-input: 6px;
            --radius-sm: 6px;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.04);

            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ═══════════════════════════════════════════
           Global Reset & Scrollbar
           ═══════════════════════════════════════════ */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        /* ═══════════════════════════════════════════
           Body & Layout
           ═══════════════════════════════════════════ */
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-container { display: flex; height: 100vh; }

        /* ═══════════════════════════════════════════
           Animations
           ═══════════════════════════════════════════ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 5px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        @keyframes pulse-blue {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        /* ═══════════════════════════════════════════
           Sidebar — Light Theme
           ═══════════════════════════════════════════ */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            z-index: 10;
        }

        .logo {
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            position: relative;
            overflow: hidden;
        }

        .logo::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        .nav-menu {
            flex: 1;
            padding: 12px 0;
            overflow-y: auto;
        }

        .nav-item {
            padding: 12px 24px;
            margin: 2px 12px;
            cursor: pointer;
            transition: all 0.2s var(--ease);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            border-radius: var(--radius-btn);
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            color: var(--text-primary);
            background: var(--primary-light);
            border-left-color: var(--primary);
        }

        .nav-item.active {
            color: var(--primary);
            background: var(--primary-light);
            border-left-color: var(--primary);
            font-weight: 600;
        }

        .nav-item span:first-child {
            font-size: 16px;
            width: 24px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .version-badge {
            background: var(--border-light);
            padding: 2px 10px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
        }

        .system-status {
            color: var(--success);
            font-size: 11px;
        }

        /* ═══════════════════════════════════════════
           Header
           ═══════════════════════════════════════════ */
        .main-content {
            flex: 1; display: flex; flex-direction: column; min-width: 0;
        }

        .header {
            height: 72px;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header-left h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
            line-height: 1.3;
        }

        .header-breadcrumb {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-breadcrumb span:last-child {
            color: var(--text-secondary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-time {
            font-size: 13px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', 'SF Mono', monospace;
            font-variant-numeric: tabular-nums;
            background: var(--border-light);
            padding: 4px 12px;
            border-radius: 6px;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            background: rgba(16, 185, 129, 0.06);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        /* ═══════════════════════════════════════════
           Content Body
           ═══════════════════════════════════════════ */
        .content-body {
            flex: 1; padding: 32px; overflow-y: auto;
            background: var(--bg-page);
        }

        /* ═══════════════════════════════════════════
           Cards
           ═══════════════════════════════════════════ */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-sm);
            padding: 24px;
            margin-bottom: 20px;
            transition: box-shadow 0.25s var(--ease);
            animation: fadeIn 0.4s var(--ease) both;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        .card h4 {
            margin: 0 0 20px 0;
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
        }

        /* ═══════════════════════════════════════════
           Stat Cards — Dashboard
           ═══════════════════════════════════════════ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #fff;
            border-radius: var(--radius-card);
            padding: 24px;
            text-align: left;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
            transition: all 0.25s var(--ease);
            animation: fadeInUp 0.4s var(--ease) both;
        }

        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.15s; }
        .stat-card:nth-child(4) { animation-delay: 0.2s; }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Bottom color decoration line */
        .stat-card::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            border-radius: 0 0 var(--radius-card) var(--radius-card);
        }

        .stat-card:nth-child(1)::before { background: var(--primary); }
        .stat-card:nth-child(2)::before { background: var(--warning); }
        .stat-card:nth-child(3)::before { background: var(--success); }
        .stat-card:nth-child(4)::before { background: var(--info); }

        .stat-icon {
            font-size: 24px;
            margin-bottom: 12px;
            display: block;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-primary);
            margin-top: 8px;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.5px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ═══════════════════════════════════════════
           Status Indicators
           ═══════════════════════════════════════════ */
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 8px; flex-shrink: 0;
        }

        .status-idle { background-color: var(--success); box-shadow: 0 0 6px rgba(16,185,129,0.5); animation: pulse-green 2s infinite; }
        .status-working { background-color: var(--info); box-shadow: 0 0 6px rgba(59,130,246,0.5); animation: pulse-blue 1s infinite; }
        .status-standby { background-color: var(--warning); box-shadow: 0 0 6px rgba(245,158,11,0.5); }
        .status-offline { background-color: var(--text-muted); }

        /* ═══════════════════════════════════════════
           Plugin Cards
           ═══════════════════════════════════════════ */
        .plugin-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            margin-bottom: 20px;
            overflow: hidden;
            transition: all 0.25s var(--ease);
            animation: fadeIn 0.3s var(--ease) both;
        }

        .plugin-card:hover {
            border-color: #c7d2fe;
            box-shadow: var(--shadow-md);
        }

        .plugin-header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fafbfc;
            border-bottom: 1px solid var(--border-light);
        }

        .plugin-title {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            color: var(--text-primary);
        }

        .plugin-body {
            padding: 20px 24px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 32px;
            border-top: 1px solid var(--border-light);
        }

        .plugin-info p {
            margin: 10px 0;
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            line-height: 1.6;
        }

        .plugin-info strong {
            width: 90px;
            color: var(--text-primary);
            flex-shrink: 0;
            font-size: 13px;
        }

        .action-buttons {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f3f4f6;
            padding: 8px 12px;
            border-radius: var(--radius-btn);
        }

        /* ═══════════════════════════════════════════
           Status Badge (replaces dot-only)
           ═══════════════════════════════════════════ */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            line-height: 1.4;
        }

        .status-badge.working {
            background: rgba(59, 130, 246, 0.1);
            color: var(--info);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .status-badge.idle {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-badge.standby {
            background: rgba(245, 158, 11, 0.1);
            color: #d97706;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .status-badge.offline {
            background: rgba(156, 163, 175, 0.1);
            color: var(--text-muted);
            border: 1px solid rgba(156, 163, 175, 0.2);
        }

        /* ═══════════════════════════════════════════
           Terminal / Log Viewer
           ═══════════════════════════════════════════ */
        .terminal-wrapper {
            border-radius: var(--radius-btn);
            overflow: hidden;
            border: 1px solid #1e293b;
        }

        .terminal-title {
            background: #1e293b;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid #334155;
        }

        .terminal-dot {
            width: 10px; height: 10px; border-radius: 50%;
        }

        .terminal-dot.red { background: #ff5f57; }
        .terminal-dot.yellow { background: #febc2e; }
        .terminal-dot.green { background: #28c840; }

        .terminal-label {
            color: #94a3b8;
            font-size: 12px;
            margin-left: 8px;
            font-family: 'JetBrains Mono', monospace;
        }

        .plugin-logs {
            background: #0f172a;
            color: #33ff00;
            border-radius: 0;
            padding: 16px;
            height: 200px;
            min-height: 100px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            resize: vertical;
            border: none;
        }

        .log-time { color: #64748b; margin-right: 12px; }

        /* ═══════════════════════════════════════════
           Form Highlight (Add Form)
           ═══════════════════════════════════════════ */
        .form-highlight {
            border-left: 4px solid var(--primary);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            background: linear-gradient(90deg, var(--primary-lighter), transparent 40%);
            padding: 20px;
            margin-bottom: 20px;
        }

        /* ═══════════════════════════════════════════
           Element Plus Overrides
           ═══════════════════════════════════════════ */
        .el-button--primary {
            background-color: var(--primary);
            border-color: var(--primary);
            border-radius: var(--radius-btn);
            transition: all 0.2s var(--ease);
        }

        .el-button--primary:hover,
        .el-button--primary:focus {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            transform: scale(1.02);
        }

        .el-button--primary:active {
            transform: scale(0.98);
        }

        .el-button {
            border-radius: var(--radius-btn) !important;
            transition: all 0.2s var(--ease);
        }

        .el-button:active {
            transform: scale(0.97);
        }

        .el-input__wrapper {
            border-radius: var(--radius-input) !important;
            transition: box-shadow 0.2s var(--ease) !important;
        }

        .el-table {
            border-radius: var(--radius-btn);
            overflow: hidden;
        }

        .el-table th.el-table__cell {
            background-color: #f9fafb !important;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 13px;
        }

        .el-table .el-table__row {
            transition: background-color 0.15s var(--ease);
        }

        .el-table .el-table__row:hover > td.el-table__cell {
            background-color: var(--primary-lighter) !important;
        }

        .el-form-item__label {
            font-weight: 500;
            color: var(--text-primary);
        }

        .el-dialog {
            border-radius: var(--radius-card) !important;
        }

        .el-dialog__header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }

        .el-tag {
            border-radius: 6px;
            font-weight: 500;
        }

        .el-switch {
            --el-switch-on-color: var(--primary);
        }

        /* ═══════════════════════════════════════════
           🛍️ AI 推荐商品卡片样式
           ═══════════════════════════════════════════ */
        .products-filter-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
        }
        .products-filter-left { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .products-filter-right { display: flex; gap: 10px; align-items: center; }

        .products-stats-bar {
            display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .products-stat-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 20px; font-size: 13px;
            border: 1px solid; cursor: pointer; transition: all 0.2s;
            font-weight: 500;
        }
        .products-stat-chip:hover { transform: scale(1.05); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .product-card {
            background: #fff; border-radius: 12px; overflow: hidden;
            border: 1px solid #e5e7eb; transition: all 0.25s ease;
            display: flex; flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            border-color: #c7d2fe;
        }
        .product-card.decision-sushe { border-top: 3px solid #ef4444; }
        .product-card.decision-keru { border-top: 3px solid #22c55e; }
        .product-card.decision-review { border-top: 3px solid #f59e0b; }
        .product-card.decision-skip { border-top: 3px solid #94a3b8; }
        .product-card.decision-pending { border-top: 3px solid #cbd5e1; }

        .product-card-img-wrap {
            position: relative; width: 100%; height: 200px;
            background: #f8fafc; overflow: hidden;
        }
        .product-card-img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.3s;
        }
        .product-card:hover .product-card-img { transform: scale(1.05); }
        .product-card-img-placeholder {
            width: 100%; height: 100%; display: flex; align-items: center;
            justify-content: center; font-size: 48px; color: #cbd5e1; background: #f1f5f9;
        }

        .decision-badge {
            position: absolute; top: 10px; left: 10px;
            padding: 4px 10px; border-radius: 6px; font-size: 12px;
            font-weight: 600; backdrop-filter: blur(8px);
        }
        .badge-sushe { background: rgba(239,68,68,0.9); color: #fff; }
        .badge-keru { background: rgba(34,197,94,0.9); color: #fff; }
        .badge-review { background: rgba(245,158,11,0.9); color: #fff; }
        .badge-skip { background: rgba(148,163,184,0.85); color: #fff; }
        .badge-pending { background: rgba(203,213,225,0.9); color: #475569; }

        .platform-badge {
            position: absolute; top: 10px; right: 10px;
            padding: 3px 8px; border-radius: 4px; font-size: 11px;
            background: rgba(0,0,0,0.6); color: #fff;
        }

        .product-card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

        .product-card-title {
            font-size: 14px; font-weight: 600; color: #1e293b;
            line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden; text-decoration: none;
        }
        a.product-card-title:hover { color: var(--primary, #6366f1); }

        .product-card-price-row { display: flex; align-items: baseline; gap: 10px; }
        .product-price { font-size: 20px; font-weight: 700; color: #ef4444; }
        .product-max-price { font-size: 13px; color: #94a3b8; text-decoration: line-through; }

        .product-ai-info { display: flex; gap: 12px; }
        .ai-info-item {
            font-size: 12px; color: #64748b; display: flex;
            align-items: center; gap: 4px; background: #f8fafc;
            padding: 3px 8px; border-radius: 4px;
        }

        .product-features { display: flex; flex-wrap: wrap; gap: 4px; }

        .product-seller { font-size: 12px; color: #94a3b8; }

        .product-ai-reason {
            font-size: 12px; color: #64748b; line-height: 1.5;
            background: #fffbeb; padding: 8px 10px; border-radius: 6px;
            border-left: 3px solid #f59e0b;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }

        .product-card-actions {
            display: flex; align-items: center; gap: 8px;
            margin-top: auto; padding-top: 10px; border-top: 1px solid #f1f5f9;
        }
        .product-link-btn {
            font-size: 12px; color: var(--primary, #6366f1); text-decoration: none;
            margin-left: auto;
        }
        .product-link-btn:hover { text-decoration: underline; }
        .product-time { font-size: 11px; color: #cbd5e1; white-space: nowrap; }

        .products-empty {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 80px 20px;
        }
        .products-pagination {
            display: flex; justify-content: center; margin-top: 24px; padding-bottom: 20px;
        }

        /* Skeleton loading */
        .product-card-skeleton { pointer-events: none; }
        .skeleton-img {
            width: 100%; height: 200px; background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite;
        }
        .skeleton-line {
            height: 14px; margin: 8px 14px; border-radius: 4px;
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ═══════════════════════════════════════════
           Login Page
           ═══════════════════════════════════════════ */
        .login-wrapper {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative; overflow: hidden;
        }
        .login-wrapper::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255,255,255,0.05) 0%, transparent 40%);
            pointer-events: none;
        }
        .login-card {
            background: #fff; border-radius: 16px; padding: 48px 40px;
            width: 400px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative; z-index: 1; animation: fadeInUp 0.5s var(--ease) both;
        }
        .login-logo {
            text-align: center; margin-bottom: 8px;
        }
        .login-logo-icon { font-size: 40px; }
        .login-title {
            text-align: center; font-size: 22px; font-weight: 800;
            color: var(--text-primary); margin-bottom: 4px;
        }
        .login-subtitle {
            text-align: center; font-size: 13px; color: var(--text-muted);
            margin-bottom: 32px;
        }
        .login-card .el-input__wrapper {
            height: 44px; font-size: 14px;
        }
        .login-btn {
            width: 100%; height: 46px; font-size: 15px; font-weight: 600;
            letter-spacing: 1px; border-radius: 8px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none; color: #fff; cursor: pointer;
            transition: all 0.25s var(--ease);
        }
        .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
        .login-btn:active { transform: scale(0.98); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .login-error {
            background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626;
            padding: 10px 14px; border-radius: 8px; font-size: 13px;
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }

        /* ═══════════════════════════════════════════
           Sidebar User Info
           ═══════════════════════════════════════════ */
        .sidebar-user-section {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }
        .sidebar-user-info {
            display: flex; align-items: center; gap: 10px;
            padding: 8px; border-radius: 8px;
            background: var(--primary-lighter);
        }
        .sidebar-user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 14px; font-weight: 700; flex-shrink: 0;
        }
        .sidebar-user-detail {
            flex: 1; min-width: 0;
        }
        .sidebar-user-name {
            font-size: 13px; font-weight: 600; color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .sidebar-user-role {
            font-size: 11px; color: var(--text-muted);
        }
        .sidebar-logout-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            width: 100%; padding: 8px; margin-top: 8px; border-radius: 8px;
            background: none; border: 1px solid var(--border);
            color: var(--text-secondary); font-size: 13px; cursor: pointer;
            transition: all 0.2s var(--ease);
        }
        .sidebar-logout-btn:hover {
            background: #fef2f2; border-color: #fca5a5; color: #dc2626;
        }

        /* ═══════════════════════════════════════════
           Hamburger Button (mobile only)
           ═══════════════════════════════════════════ */
        .hamburger-btn {
            display: none;
            width: 40px; height: 40px;
            border: none; background: transparent;
            cursor: pointer; border-radius: 8px;
            align-items: center; justify-content: center;
            font-size: 22px; color: var(--text-primary);
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .hamburger-btn:hover { background: var(--border-light); }

        /* Sidebar overlay backdrop */
        .sidebar-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 99;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        /* ═══════════════════════════════════════════
           Responsive — Tablet (<=1024px)
           ═══════════════════════════════════════════ */
        @media (max-width: 1024px) {
            .content-body { padding: 16px; }
            .plugin-body { grid-template-columns: 1fr !important; gap: 20px !important; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        }

        /* ═══════════════════════════════════════════
           Responsive — Mobile (<=768px)
           ═══════════════════════════════════════════ */
        @media (max-width: 768px) {
            /* — Hamburger visible — */
            .hamburger-btn { display: flex; }

            /* — Sidebar: off-canvas drawer — */
            .sidebar {
                position: fixed; left: -280px; top: 0; bottom: 0;
                width: 260px; z-index: 100;
                transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: none;
            }
            .sidebar.open {
                left: 0;
                box-shadow: 4px 0 24px rgba(0,0,0,0.15);
            }
            .sidebar.open ~ .sidebar-overlay { display: block; }

            /* — Header: compact — */
            .header { height: 56px; padding: 0 12px; gap: 8px; }
            .header-left h3 { font-size: 15px; }
            .header-breadcrumb { display: none; }
            .header-time { display: none; }
            .header-status { font-size: 11px; padding: 4px 10px; }
            .header-status span:last-child { display: none; }

            /* — Content body — */
            .content-body { padding: 12px; }

            /* — Stat cards: 1 column — */
            .stats-grid { grid-template-columns: 1fr; gap: 12px; }

            /* — Cards: tighter padding — */
            .card { padding: 16px; margin-bottom: 12px; }

            /* — Plugin body: stack — */
            .plugin-body { grid-template-columns: 1fr !important; gap: 16px !important; padding: 16px !important; }

            /* — Tables: horizontal scroll — */
            .el-table { font-size: 13px; }
            .card .el-table { overflow-x: auto; display: block; }

            /* — Inline forms: stack vertically — */
            .el-form--inline .el-form-item {
                display: block !important; width: 100% !important;
                margin-right: 0 !important; margin-bottom: 12px !important;
            }
            .el-form--inline .el-form-item .el-input,
            .el-form--inline .el-form-item .el-select,
            .el-form--inline .el-form-item .el-textarea {
                width: 100% !important;
            }
            .form-highlight { display: flex; flex-direction: column; }
            .form-highlight .el-form-item { width: 100%; }

            /* — Products grid: 1 column — */
            .products-grid { grid-template-columns: 1fr; gap: 12px; }
            .products-filter-bar { flex-direction: column; align-items: stretch; gap: 8px; }
            .products-filter-left { flex-direction: column; gap: 8px; }
            .products-filter-left .el-input,
            .products-filter-left .el-select { width: 100% !important; }
            .products-filter-left > div { width: 100%; }
            .products-filter-left input[type="date"] { width: 100% !important; }
            .products-filter-right { justify-content: space-between; }
            .products-stats-bar { gap: 6px; }
            .products-stat-chip { font-size: 12px; padding: 5px 10px; }

            /* — Product card image: shorter — */
            .product-card-img-wrap { height: 160px; }

            /* — Chat: stack vertically — */
            .chat-mobile-list { width: 100% !important; min-width: 0 !important; }
            .chat-mobile-window { width: 100% !important; }
            .chat-mobile-container { flex-direction: column !important; height: auto !important; min-height: calc(100vh - 180px); }
            .chat-mobile-container > div:first-child { height: 45vh; flex-shrink: 0; }
            .chat-mobile-container > div:last-child { height: 50vh; }

            /* — Dialogs: near full-width — */
            .el-dialog {
                width: 95vw !important; margin: 5vh auto !important;
                max-height: 85vh; overflow-y: auto;
            }
            .el-dialog__body { padding: 16px !important; }

            /* — Buttons: larger touch targets — */
            .el-button { min-height: 40px; }
            .nav-item { min-height: 48px; }

            /* — Login page — */
            .login-wrapper .login-box { width: 90vw; padding: 28px 20px; }

            /* — Action buttons in plugin cards — */
            .action-buttons { flex-wrap: wrap; }
            .plugin-info strong { width: 80px; font-size: 12px; }

            /* — Task form — */
            .el-form-item__label { font-size: 13px; }

            /* ════════════════════════════════
               节点管控 — Plugin Cards Mobile
               ════════════════════════════════ */
            .plugin-header {
                flex-direction: column; align-items: flex-start !important;
                padding: 14px 16px; gap: 10px;
            }
            .plugin-title {
                font-size: 14px; flex-wrap: wrap; gap: 6px;
                width: 100%;
            }
            .plugin-title .status-badge { margin-left: 0 !important; }
            .action-buttons {
                width: 100%; justify-content: flex-start;
                padding: 10px 12px; gap: 6px;
                background: #fff; border-top: 1px solid #f0f0f0;
            }
            .action-buttons .el-switch { margin-right: 8px !important; }
            .plugin-card { border-radius: 10px; }
            .plugin-body { padding: 14px 16px !important; }
            .plugin-info p { margin: 8px 0; font-size: 13px; }
            .plugin-info strong { width: 72px; font-size: 12px !important; }
            .terminal-wrapper { border-radius: 8px; }

            /* ════════════════════════════════
               任务指挥 — Task Form Mobile
               ════════════════════════════════ */
            .task-mobile .el-col { 
                flex: 0 0 100% !important; max-width: 100% !important; 
            }
            .task-mobile .el-row { 
                flex-wrap: wrap !important; 
            }
            .task-mobile .el-radio-group {
                display: flex !important; flex-wrap: wrap !important; gap: 4px;
            }
            .task-mobile .el-radio-button {
                flex: 1; min-width: 0;
            }
            .task-mobile .el-radio-button__inner {
                width: 100%; padding: 8px 6px !important; font-size: 12px;
            }
            .task-mobile .el-input-number { width: 100% !important; }
            .task-mobile .el-form-item { margin-bottom: 14px; }
            .task-mobile .el-form-item__label { 
                float: none !important; display: block !important; 
                text-align: left !important; padding-bottom: 4px !important; 
                font-size: 13px; font-weight: 600;
            }
            .task-mobile-submit { 
                width: 100% !important; margin-left: 0 !important; 
                height: 48px; font-size: 15px; 
            }
            .task-mobile-danger {
                width: 100% !important; margin-left: 0 !important; margin-top: 8px;
            }
            .task-groups-mobile .el-tag { font-size: 11px; }

            /* ════════════════════════════════
               私聊监控 — Chat Mobile (切换式)
               ════════════════════════════════ */
            .chat-mobile-container {
                flex-direction: column !important; height: auto !important;
                min-height: calc(100vh - 140px); position: relative;
            }
            .chat-mobile-list {
                width: 100% !important; min-width: 0 !important;
                border-radius: 10px;
            }
            .chat-mobile-window {
                width: 100% !important; border-radius: 10px;
            }
            /* 列表/聊天切换 */
            .chat-mobile-hidden { display: none !important; }
            .chat-back-btn { display: inline-flex !important; }
            .chat-header-bar {
                padding: 10px 12px !important;
                flex-wrap: wrap; gap: 6px;
            }
            .chat-header-bar > div:first-child {
                min-width: 0; flex: 1;
            }
            .chat-header-bar > div:first-child span:first-child {
                font-size: 14px; display: block;
                overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            }
            .chat-header-bar > div:first-child span:last-child {
                font-size: 11px; display: block; margin-left: 0; margin-top: 2px;
            }
            .chat-messages-area { padding: 10px !important; }
            .chat-msg-bubble { max-width: 85% !important; font-size: 13px; }
            .chat-input-bar { padding: 8px 10px !important; }
        }

        /* ═══════════════════════════════════════════
           Responsive — Small phone (<=480px)
           ═══════════════════════════════════════════ */
        @media (max-width: 480px) {
            .header { height: 48px; padding: 0 8px; }
            .header-left h3 { font-size: 14px; }
            .header-status { display: none; }
            .content-body { padding: 8px; }
            .card { padding: 12px; border-radius: 8px; }
            .stat-card { padding: 14px; }
            .stat-value { font-size: 22px; }
            .product-card-img-wrap { height: 140px; }
            .product-card-body { padding: 10px; }
            .product-card-title { font-size: 13px; }
            .product-price { font-size: 16px; }
            .products-stat-chip { font-size: 11px; padding: 4px 8px; }
            .el-dialog { width: 100vw !important; margin: 0 !important; border-radius: 0 !important; max-height: 100vh; }
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- Login Page -->
        <div v-if="!isLoggedIn" class="login-wrapper">
            <div class="login-card">
                <div class="login-logo"><span class="login-logo-icon">🚀</span></div>
                <div class="login-title">X-RADAR HUB</div>
                <div class="login-subtitle">分布式控制中枢 · 身份认证</div>
                <div v-if="loginError" class="login-error">⚠️ {{ loginError }}</div>
                <div style="margin-bottom: 20px;">
                    <div style="font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px;">用户名</div>
                    <el-input v-model="loginForm.username" placeholder="请输入用户名" size="large"
                        @keyup.enter="handleLogin" :disabled="loginLoading" clearable />
                </div>
                <div style="margin-bottom: 28px;">
                    <div style="font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px;">密码</div>
                    <el-input v-model="loginForm.password" placeholder="请输入密码" type="password" size="large"
                        show-password @keyup.enter="handleLogin" :disabled="loginLoading" />
                </div>
                <button class="login-btn" @click="handleLogin" :disabled="loginLoading || !loginForm.username || !loginForm.password">
                    {{ loginLoading ? '正在验证...' : '🔐 登 录' }}
                </button>
                <div style="text-align: center; margin-top: 24px; font-size: 12px; color: #9ca3af;">
                    X-Radar v2.4.0 · Secured with JWT
                </div>
            </div>
        </div>

        <!-- Main App (when logged in) -->
        <template v-if="isLoggedIn">
        <div class="app-container">
            <div class="sidebar" :class="{ open: sidebarOpen }">
                <div class="logo">🚀 X-RADAR HUB</div>
                <div class="nav-menu">
                    <div class="nav-item" :class="{ active: activeMenu === 'dashboard' }" @click="activeMenu = 'dashboard'; sidebarOpen = false"><span>📊</span> 集群大盘</div>
                    <div class="nav-item" :class="{ active: activeMenu === 'plugins' }" @click="activeMenu = 'plugins'; sidebarOpen = false"><span>💻</span> 节点管控</div>
                    <div class="nav-item" :class="{ active: activeMenu === 'tasks' }" @click="activeMenu = 'tasks'; sidebarOpen = false"><span>🎯</span> 任务指挥</div>
                    <div class="nav-item" :class="{ active: activeMenu === 'models' }" @click="activeMenu = 'models'; sidebarOpen = false"><span>🧠</span> AI 核心</div>
                    <div class="nav-item" :class="{ active: activeMenu === 'emails' }" @click="activeMenu = 'emails'; sidebarOpen = false"><span>📧</span> 告警通道</div>
                    <div class="nav-item" :class="{ active: activeMenu === 'chat' }" @click="activeMenu = 'chat'; fetchConversations(); sidebarOpen = false"><span>💬</span> 私聊监控</div>
                    <div class="nav-item" :class="{ active: activeMenu === 'products' }" @click="activeMenu = 'products'; fetchProducts(); sidebarOpen = false"><span>🛍️</span> AI 推荐</div>
                    <div v-if="currentUser.role === 'admin'" class="nav-item" :class="{ active: activeMenu === 'users' }" @click="activeMenu = 'users'; fetchUsers(); sidebarOpen = false"><span>👥</span> 用户管理</div>
                </div>
                <div class="sidebar-user-section">
                    <div class="sidebar-user-info">
                        <div class="sidebar-user-avatar">{{ (currentUser.username || '?')[0].toUpperCase() }}</div>
                        <div class="sidebar-user-detail">
                            <div class="sidebar-user-name">{{ currentUser.username }}</div>
                            <div class="sidebar-user-role">{{ currentUser.role === 'admin' ? '管理员' : '普通用户' }}</div>
                        </div>
                    </div>
                    <button class="sidebar-logout-btn" @click="handleLogout">🚪 退出登录</button>
                </div>
                <div class="sidebar-footer">
                    <span class="version-badge">v2.4.0</span>
                    <span class="system-status">● 系统正常</span>
                </div>
            </div>
            <!-- Mobile sidebar overlay -->
            <div class="sidebar-overlay" @click="sidebarOpen = false"></div>

            <div class="main-content">
                <div class="header">
                    <button class="hamburger-btn" @click="sidebarOpen = !sidebarOpen" aria-label="菜单">☰</button>
                    <div class="header-left">
                        <h3>{{ menuTitle }}</h3>
                        <div class="header-breadcrumb">
                            <span>X-Radar</span> / <span>{{ menuTitle }}</span>
                        </div>
                    </div>
                    <div class="header-right">
                        <div class="header-time" id="headerClock">--:--:--</div>
                        <div class="header-status">
                            <span class="status-dot status-idle"></span>
                            <span>实时通讯已连接</span>
                        </div>
                    </div>
                </div>

                <div class="content-body">
                    <div v-if="activeMenu === 'dashboard'">
                        <div class="stats-grid">
                            <div class="stat-card">
                                <span class="stat-icon">📦</span>
                                <div class="stat-label">今日斩获数据</div>
                                <div class="stat-value" style="color: var(--primary);">{{ stats.total_products }}</div>
                            </div>
                            <div class="stat-card">
                                <span class="stat-icon">🧠</span>
                                <div class="stat-label">AI 待评估</div>
                                <div class="stat-value" style="color: #f59e0b">{{ stats.pending_evaluation }}</div>
                            </div>
                            <div class="stat-card">
                                <span class="stat-icon">✅</span>
                                <div class="stat-label">精准命中</div>
                                <div class="stat-value" style="color: #10b981">{{ stats.approved }}</div>
                            </div>
                            <div class="stat-card">
                                <span class="stat-icon">🌐</span>
                                <div class="stat-label">在线节点</div>
                                <div class="stat-value" style="color: #3b82f6">{{ activeNodesCount }} / {{ plugins.length }}</div>
                            </div>
                        </div>

                        <div class="card">
                            <h4 style="margin: 0 0 20px 0; color: #1e293b;">数据流速监控</h4>
                            <div ref="chartRef" style="height: 300px;"></div>
                        </div>
                    </div>
                    
                    <div v-if="activeMenu === 'tasks'">
                        <!-- 🆕 任务组管理 -->
                        <div class="card task-groups-mobile" style="max-width: 1000px; margin-bottom: 16px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                                <h4 style="margin: 0; color: #1e293b;">📦 任务组（节点分组）</h4>
                                <el-button size="small" type="primary" plain @click="showCreateGroup = true">+ 新建任务组</el-button>
                            </div>
                            <div v-if="taskGroups.length === 0" style="color: #9ca3af; font-size: 13px; padding: 8px 0;">
                                暂无任务组，创建后可快速将任务派发给指定节点组合
                            </div>
                            <div v-for="g in taskGroups" :key="g.id" style="display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #f3f4f6;">
                                <span style="font-weight: 600; min-width: 120px;">{{ g.name }}</span>
                                <div style="display: flex; gap: 4px; flex-wrap: wrap; flex: 1;">
                                    <el-tag v-for="pid in g.plugin_ids" :key="pid" size="small" type="info">
                                        {{ plugins.find(p => p.id === pid)?.name || pid.substring(0,8) }}
                                    </el-tag>
                                </div>
                                <el-button size="small" type="danger" plain @click="deleteTaskGroup(g.id)">删除</el-button>
                            </div>
                        </div>

                        <!-- 🆕 新建任务组弹窗 -->
                        <el-dialog v-model="showCreateGroup" title="新建任务组" width="440px">
                            <el-form label-position="top">
                                <el-form-item label="任务组名称" required>
                                    <el-input v-model="newGroupName" placeholder="如：华为探测组" />
                                </el-form-item>
                                <el-form-item label="选择节点" required>
                                    <el-checkbox-group v-model="newGroupPlugins">
                                        <el-checkbox v-for="p in plugins" :key="p.id" :label="p.id" :value="p.id">
                                            {{ p.name }}
                                        </el-checkbox>
                                    </el-checkbox-group>
                                </el-form-item>
                            </el-form>
                            <template #footer>
                                <el-button @click="showCreateGroup = false">取消</el-button>
                                <el-button type="primary" @click="createTaskGroup" :disabled="!newGroupName || newGroupPlugins.length === 0">创建</el-button>
                            </template>
                        </el-dialog>

                        <div class="card" style="max-width: 1000px;">
                            <el-form label-width="120px" :model="taskForm" class="task-mobile">
                                <el-form-item label="探测目标" required>
                                    <el-input v-model="taskForm.keywords" type="textarea" :rows="2" placeholder="输入商品关键词，例如：iPhone 15, 大疆无人机 (支持中英文逗号)"></el-input>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script>
        const { createApp, ref, onMounted, onUnmounted, computed } = Vue;
        // B6 修复：动态推断后端地址，不再硬编码内网 IP
        const _host = window.location.host || '127.0.0.1:15001';
        const _protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const API_URL = `http://${_host}/api`;
        const WS_URL = `${_protocol}//${_host}/ws`;

        // ═══ JWT Authentication Interceptors ═══
        axios.interceptors.request.use(config => {
            const _token = localStorage.getItem('xradar_token');
            if (_token) {
                config.headers.Authorization = `Bearer ${_token}`;
            }
            return config;
        });
        axios.interceptors.response.use(
            response => response,
            error => {
                if (error.response && error.response.status === 401) {
                    const _url = error.config?.url || '';
                    // Don't redirect on login endpoint failure
                    if (_url.includes('/api/login')) return Promise.reject(error);
                    localStorage.removeItem('xradar_token');
                    localStorage.removeItem('xradar_user');
                    window.location.reload();
                }
                return Promise.reject(error);
            }
        );

        createApp({
            setup() {
                // ═══ Auth State ═══
                const authToken = ref(localStorage.getItem('xradar_token') || '');
                const isLoggedIn = ref(!!authToken.value);
                const currentUser = ref(JSON.parse(localStorage.getItem('xradar_user') || '{}'));
                const loginForm = ref({ username: '', password: '' });
                const loginError = ref('');
                const loginLoading = ref(false);

                // ═══ User Management State ═══
                const usersList = ref([]);
                const usersLoading = ref(false);
                const showCreateUser = ref(false);
                const newUserForm = ref({ username: '', password: '', role: 'user', max_plugins: 3, expires_at: null });

                // 🆕 编辑模型/邮箱弹窗状态
                const showEditModel = ref(false);
                const editModelForm = ref({ id: '', name: '', model_name: '', base_url: '', api_key: '', prompt_template: '' });
                const showEditEmail = ref(false);
                const editEmailForm = ref({ id: '', name: '', sender: '', receiver: '', auth_code: '', service: 'smtp.qq.com', port: 465, html_template: '' });

                // ═══ Login / Logout ═══
                const handleLogin = async () => {
                    loginError.value = '';
                    loginLoading.value = true;
                    try {
                        const res = await axios.post(`${API_URL}/login`, {
                            username: loginForm.value.username,
                            password: loginForm.value.password
                        });
                        const data = res.data;
                        localStorage.setItem('xradar_token', data.token);
                        localStorage.setItem('xradar_user', JSON.stringify(data.user));
                        authToken.value = data.token;
                        currentUser.value = data.user;
                        isLoggedIn.value = true;
                        loginForm.value = { username: '', password: '' };
                        // Load data after login
                        setTimeout(() => { refreshAll(); connectGlobalAdminWS(); connectChatWS(); }, 100);
                    } catch (e) {
                        if (e.response && e.response.status === 401) {
                            loginError.value = '用户名或密码错误';
                        } else if (e.response && e.response.data && e.response.data.detail) {
                            loginError.value = e.response.data.detail;
                        } else {
                            loginError.value = '登录失败，请检查网络连接';
                        }
                    } finally {
                        loginLoading.value = false;
                    }
                };

                const handleLogout = () => {
                    localStorage.removeItem('xradar_token');
                    localStorage.removeItem('xradar_user');
                    authToken.value = '';
                    currentUser.value = {};
                    isLoggedIn.value = false;
                    // Close all WebSocket connections
                    Object.values(wsMap).forEach(ws => ws.close());
                    if (globalAdminWS) { globalAdminWS.close(); globalAdminWS = null; }
                    if (chatWS) { chatWS.close(); chatWS = null; }
                    if (window._refreshInterval) { clearInterval(window._refreshInterval); window._refreshInterval = null; }
                };

                // ═══ User Management Methods ═══
                const fetchUsers = async () => {
                    usersLoading.value = true;
                    try {
                        const res = await axios.get(`${API_URL}/admin/users`);
                        usersList.value = res.data;
                    } catch (e) {
                        console.error('获取用户列表失败:', e);
                    } finally {
                        usersLoading.value = false;
                    }
                };

                const createUser = async () => {
                    try {
                        const payload = {
                            username: newUserForm.value.username,
                            password: newUserForm.value.password,
                            role: newUserForm.value.role,
                            max_plugins: newUserForm.value.max_plugins || 3,
                        };

                            keywords: kwStr.split(/[,，]/).map(k => k.trim()).filter(Boolean),

                const createModel = async () => {
                    if (!newModel.value.name || !newModel.value.api_key) {
                        ElementPlus.ElMessage.warning('名称和 API Key 不能为空');
                        return;
                    }
                    await axios.post(`${API_URL}/models`, {
                        name: newModel.value.name,
                        model_name: newModel.value.model_name || 'deepseek-chat',
                        base_url: newModel.value.base_url || 'https://api.deepseek.com',
                        api_key: newModel.value.api_key,
                        prompt_template: newModel.value.prompt
                    });
                    newModel.value = { name: '', model_name: '', base_url: '', api_key: '', prompt: '' };
                    refreshAll();
                    ElementPlus.ElMessage.success('模型已添加');
                };

                const editModel = (model) => {
                    // 打开弹窗，填充表单
                    editModelForm.value = {
                        id: model.id,
                        name: model.name,
                        model_name: model.model_name,
                        base_url: model.base_url,
                        api_key: '',  // 不回传加密值
                        prompt_template: model.prompt_template
                    };
                    showEditModel.value = true;
                };

                const saveModel = async () => {
                    const f = editModelForm.value;
                    if (!f.name || !f.model_name || !f.base_url) {
                        ElementPlus.ElMessage.warning('名称、模型引擎、Base URL 不能为空');
                        return;
                    }
                    try {
                        await axios.put(`${API_URL}/models/${f.id}`, {
                            name: f.name,
                            model_name: f.model_name,
                            base_url: f.base_url,
                            api_key: f.api_key || '****',
                            prompt_template: f.prompt_template
                        });
                        showEditModel.value = false;
                        refreshAll();
                        ElementPlus.ElMessage.success('模型已更新');
                    } catch (e) {
                        ElementPlus.ElMessage.error('更新失败: ' + (e.response?.data?.detail || e.message));
                    }
                };

                const deleteModel = async (id) => {
                    await axios.delete(`${API_URL}/models/${id}`);
                    refreshAll();
                    ElementPlus.ElMessage.success('模型已删除');
                };

                // ====================
                // 邮箱 CRUD 逻辑
                // ====================
                const createEmail = async () => {
                    if (!newEmail.value.sender || !newEmail.value.auth_code) {
                        ElementPlus.ElMessage.warning('发件人和授权码不能为空');
                        return;
                    }
                    await axios.post(`${API_URL}/emails`, newEmail.value);
                    newEmail.value = { name: '', sender: '', receiver: '', auth_code: '', html_template: '', service: 'smtp.qq.com', port: 465 };
                    refreshAll();
                    ElementPlus.ElMessage.success('邮箱已添加');
                };

                const editEmail = (email) => {
                    // 打开弹窗，填充表单
                    editEmailForm.value = {
                        id: email.id,
                        name: email.name,
                        sender: email.sender,
                        receiver: email.receiver,
                        auth_code: '',  // 不回传加密值
                        service: email.service,
                        port: email.port,
                        html_template: email.html_template || ''
                    };
                    showEditEmail.value = true;
                };

                const saveEmail = async () => {
                    const f = editEmailForm.value;
                    if (!f.name || !f.sender) {
                        ElementPlus.ElMessage.warning('通道别名和发件人不能为空');
                        return;
                    }
                    try {
                        await axios.put(`${API_URL}/emails/${f.id}`, {
                            name: f.name,
                            sender: f.sender,
                            receiver: f.receiver,
                            auth_code: f.auth_code || '****',
                            service: f.service,
                            port: f.port,
                            html_template: ''
                        });
                        showEditEmail.value = false;
                        refreshAll();
                        ElementPlus.ElMessage.success('告警通道已更新');
                    } catch (e) {
                        ElementPlus.ElMessage.error('更新失败: ' + (e.response?.data?.detail || e.message));
                    }
                };

                const deleteEmail = async (id) => {
                    await axios.delete(`${API_URL}/emails/${id}`);
                    refreshAll();
                    ElementPlus.ElMessage.success('邮箱已删除');
                };

                // ==========================================
                // 🆕 私聊监控方法
                // ==========================================

                const filteredConversations = computed(() => {
                    return conversations.value.filter(c => {
                        if (chatStageFilter.value !== 'all' && c.stage !== chatStageFilter.value) return false;
                        if (chatFilter.value) {
                            const q = chatFilter.value.toLowerCase();
                            return (c.seller_name || '').toLowerCase().includes(q) ||
                                   (c.item_title || '').toLowerCase().includes(q) ||
                                   (c.seller_id || '').includes(q);
                        }
                        return true;
                    });
                });

                const stageName = (s) => ({opening:'开场',condition:'验货',price_eval:'估价',negotiating:'砍价',closing:'收尾',done:'结束',manual:'手动'}[s] || s);
                const stageTagType = (s) => ({opening:'',condition:'warning',price_eval:'warning',negotiating:'danger',closing:'success',done:'info',manual:''}[s] || 'info');
                const formatTime = (t) => t ? new Date(t).toLocaleString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'}) : '';

                const fetchConversations = async () => {
                    try {
                        const params = chatStageFilter.value !== 'all' ? `?stage=${chatStageFilter.value}` : '';
                        const res = await axios.get(`${API_URL}/chat/conversations${params}`);
                        conversations.value = res.data.items || [];
                    } catch (e) { console.warn('[chat] 获取对话列表失败:', e); }
                };

                const selectConversation = async (conv) => {
                    mobileChatView.value = 'chat';  // 移动端切到聊天视图
                    selectedConv.value = conv;
                    try {
                        const res = await axios.get(`${API_URL}/chat/conversations/${conv.id}`);
                        chatMessages.value = res.data.messages || [];
                        // 滚动到底部
                        setTimeout(() => {
                            if (chatMessagesRef.value) chatMessagesRef.value.scrollTop = chatMessagesRef.value.scrollHeight;
                        }, 100);
                    } catch (e) { console.warn('[chat] 获取对话详情失败:', e); }
                };

                const sendManualMsg = async () => {
                    if (!chatInput.value.trim() || !selectedConv.value) return;
                    try {
                        await axios.post(`${API_URL}/chat/conversations/${selectedConv.value.id}/send`, { content: chatInput.value.trim() });
                        // 刷新消息列表
                        chatInput.value = '';
                        await selectConversation(selectedConv.value);
                    } catch (e) { ElementPlus.ElMessage.error('发送失败'); }
                };

                const toggleTakeover = async (conv) => {
                    const newMode = conv.stage === 'manual' ? 'ai' : 'manual';
                    try {
                        await axios.post(`${API_URL}/chat/conversations/${conv.id}/takeover`, { mode: newMode });
                        conv.stage = newMode === 'ai' ? 'opening' : 'manual';
                        ElementPlus.ElMessage.success(newMode === 'ai' ? 'AI 已接管' : '已切换为手动模式');
                    } catch (e) { ElementPlus.ElMessage.error('切换失败'); }
                };

                // 管理端聊天 WS 连接 (接收实时消息)
                const connectChatWS = () => {
                    if (chatWS) chatWS.close();
                    chatWS = new WebSocket(`${_protocol}//${_host}/api/chat/ws/admin?token=${localStorage.getItem('xradar_token')}`);
                    chatWS.onmessage = (e) => {
                        try {
                            const data = JSON.parse(e.data);
                            if (data.type === 'new_message' && selectedConv.value && data.conversation_id === selectedConv.value.id) {
                                chatMessages.value.push(data.message);
                                setTimeout(() => {
                                    if (chatMessagesRef.value) chatMessagesRef.value.scrollTop = chatMessagesRef.value.scrollHeight;
                                }, 50);
                            }
                            if (data.type === 'new_message') {
                                // 更新对话列表的最新消息时间
                                fetchConversations();
                            }
                        } catch (err) {}
                    };
                    chatWS.onclose = () => {
                        // 🆕 只在已登录时重连
                        if (localStorage.getItem('xradar_token')) {
                            setTimeout(connectChatWS, 5000);
                        }
                    };
                };
                // 🆕 只在已登录时连接
                if (localStorage.getItem('xradar_token')) {
                    connectChatWS();
                }

                const renderChart = () => {
                    if (!chartInstance) chartInstance = echarts.init(chartRef.value);
                    // B16 修复：从真实统计数据渲染图表（当前为空数据占位，待后端提供时序 API）
                    chartInstance.setOption({
                        tooltip: { trigger: 'axis' },
                        xAxis: { type: 'category', data: ['今日'] },
                        yAxis: { type: 'value' },
                        series: [{ data: [stats.value.total_products || 0], type: 'bar', itemStyle: { color: '#6366f1' } }],
                        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                        title: { text: '（实时数据流速监控开发中，当前展示今日采集总量）', textStyle: { fontSize: 12, color: '#94a3b8' }, left: 'center', top: '10' }
                    });
                };

                onMounted(() => {
                    if (!isLoggedIn.value) return; // Don't load data if not logged in
                    refreshAll();
                    window.addEventListener('resize', () => chartInstance?.resize());
                    
                    // 🌟 开启 WebSocket 监听
                    connectGlobalAdminWS(); 

                    // B18 修复：页面不可见时降低刷新频率，节省资源
                    document.addEventListener('visibilitychange', () => {
                        if (document.hidden) {
                            // 页面切到后台，停止轮询
                            if (window._refreshInterval) { clearInterval(window._refreshInterval); window._refreshInterval = null; }
                        } else {
                            // 页面回到前台，立即刷新一次 + 恢复轮询
                            refreshAll();
                            if (!window._refreshInterval) window._refreshInterval = setInterval(refreshAll, 15000);
                        }
                    });
                    // 每 15 秒自动刷新（仅在页面可见时）
                    window._refreshInterval = setInterval(refreshAll, 15000);
                });

                onUnmounted(() => {
                    Object.values(wsMap).forEach(ws => ws.close());
                    if (globalAdminWS) globalAdminWS.close();
                    if (window._refreshInterval) { clearInterval(window._refreshInterval); window._refreshInterval = null; } // B18 清理
                    if (chatWS) chatWS.close(); // 🆕 清理聊天 WS
                });

                return {
                    // Auth
                    isLoggedIn, currentUser, authToken, loginForm, loginError, loginLoading,
                    handleLogin, handleLogout,
                    // User management
                    usersList, usersLoading, showCreateUser, newUserForm,
                    fetchUsers, createUser, toggleUserStatus, updateUserMaxPlugins, deleteUser,
                    // Existing
                    sidebarOpen, activeMenu, menuTitle, stats, plugins, models, emails, activeNodesCount,
                    refreshAll, togglePlugin, deletePlugin, showRegisterPlugin, registerForm, registerPlugin,
                    showBindConfig, bindConfig, openBindConfig, saveBindConfig, clearCloudTasks,
                    visibleLogPluginId, currentLogPlugin, currentLogs, toggleLogs, chartRef, taskForm, submitCloudTask,
                    taskGroups, showCreateGroup, newGroupName, newGroupPlugins, fetchTaskGroups, createTaskGroup, deleteTaskGroup,
                    // 暴露 CRUD 方法
                    newModel, createModel, editModel, deleteModel,
                    showEditModel, editModelForm, saveModel,
                    newEmail, createEmail, editEmail, deleteEmail,
                    showEditEmail, editEmailForm, saveEmail,
                    taskHistory, fetchTaskHistory,historyTogglePlugin , logStates, toggleAll,
                    // 🆕 私聊监控
                    conversations, chatMessages, selectedConv, chatFilter, chatStageFilter,
                    mobileChatView, chatInput, chatMessagesRef, filteredConversations,
                    fetchConversations, selectConversation, sendManualMsg, toggleTakeover,
                    stageName, stageTagType, formatTime,
                    // 🛍️ AI 推荐商品
                    products, productsTotal, productsPage, productsPageSize, productsLoading,
                    productsSearch, productsAiFilter, productsSort, productsDateFrom, productsDateTo, productsDecisionStats,
                    fetchProducts, debounceFetchProducts, updateProductStatus,
                    getDecision, getDecisionKey, getDecisionIcon, formatProductTime
                };
            }
        }).use(ElementPlus).mount('#app');

        // Header clock
        setInterval(() => {
            const el = document.getElementById('headerClock');
            if (el) el.textContent = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
